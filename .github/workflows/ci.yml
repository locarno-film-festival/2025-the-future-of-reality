name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libavcodec-extra

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov flake8 black==25.1.0 psutil
        pip install librosa "moviepy<2" scenedetect opencv-python matplotlib numpy
        pip install -e .

    - name: Lint with flake8
      run: |
        flake8 . --exclude=attic --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --exclude=attic --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check code formatting with black
      run: |
        black --check --diff .

    - name: Run unit tests
      run: |
        python -m pytest tests/unit/ -v --cov=music_video_generator --cov-report=term-missing

    - name: Run integration tests
      run: |
        python -m pytest tests/integration/ -v --tb=short

    - name: Run performance benchmarks
      run: |
        python -m pytest tests/performance/ -v --tb=short
